name: Telegram 自动签到

on:
  schedule:
    # 每天触发一次检查是否到达指定的间隔天数
    - cron: '0 1 * * *'   # UTC 01:00 (北京时间 09:00)
  workflow_dispatch:
    inputs:
      send_all:
        description: '向所有目标发送（忽略间隔天数）'
        required: false
        type: boolean
        default: true
      target:
        description: '仅向指定目标发送（留空则按规则处理）'
        required: false
        type: string
        default: ''

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checkin
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TARGETS_KEY: ${{ secrets.TARGETS_KEY }}
          # 向后兼容旧的单目标配置
          TARGET: ${{ secrets.TARGET }}
          MESSAGE: ${{ secrets.MESSAGE }}
          WAIT_RESPONSE: ${{ secrets.WAIT_RESPONSE }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.send_all }}" = "true" ] && [ -z "${{ inputs.target }}" ]; then
              ARGS="--all"
            elif [ -n "${{ inputs.target }}" ]; then
              ARGS="--target ${{ inputs.target }}"
            fi
          fi
          python checkin.py $ARGS

      - name: Commit checkin status
        run: |
          if [ -f checkin_status.json ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add checkin_status.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update checkin status" && git push)
          fi
